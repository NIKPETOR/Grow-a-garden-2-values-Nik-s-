  <path d="M260 310 C250 270, 270 250, 280 230 C290 250, 300 270, 290 310 Z" fill="#16a34a"/>
  <path d="M300 300 C290 260, 310 240, 320 220 C330 240, 340 260, 330 300 Z" fill="#4ade80"/>

